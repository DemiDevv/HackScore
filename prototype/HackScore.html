<body>

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext, Fragment } = React;

  'chevron-left':<><polyline points="15 18 9 12 15 6"/></>,
  'chevron-down':<><polyline points="6 9 12 15 18 9"/></>,

  'arrow-left':<><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
  'external-link':<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></>,
  trophy:<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
  star:<><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></>,
  'bar-chart':<><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></>,
  clock:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,

  edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
  save:<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,

  target:<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
  zap:<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
  'git-branch':<><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></>,
  clipboard:<><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="8" y="2" rx="1"/></>,
  send:<><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,

  info:<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></>,
  loader:<><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/></>,
  presentation:<><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></>,
  crown:<><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7z"/><path d="M4 18h16v2H4z"/></>,
  inbox:<><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></>,
  'grip-vertical':<><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>,
  rocket:<><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></>,
  hash:<><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></>,
  shield:<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>,
  'file-code':<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 13-2 2 2 2"/><path d="m14 17 2-2-2-2"/></>,
};

function Icon({name,size=20,className='',style={},onClick}){
  const c=I[name];
  if(!c) return <span style={{width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:size*.6,...style}}>{name}</span>;
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={{flexShrink:0,...style}} onClick={onClick}>{c}</svg>;
}

// ══════════════════════════════════════════════
// BUTTON
// ══════════════════════════════════════════════
function Button({children,variant='primary',size='md',icon,iconRight,loading,disabled,onClick,style:cs,fullWidth,type='button'}){
  const[h,setH]=useState(false);
  const sz={sm:{padding:'6px 12px',fontSize:12,gap:6},md:{padding:'8px 16px',fontSize:13,gap:8},lg:{padding:'12px 24px',fontSize:14,gap:8}};
  const vs={
    primary:{background:'linear-gradient(135deg,var(--accent),#4F5BD5 50%,var(--cyan))',color:'#fff',border:'none'},
    secondary:{background:'transparent',color:'var(--t1)',border:'1px solid var(--border)'},
    ghost:{background:'transparent',color:'var(--t2)',border:'none'},
    danger:{background:'var(--red-15)',color:'var(--red)',border:'1px solid rgba(239,68,68,.2)'},
  };
  const hv={primary:{filter:'brightness(1.15)',transform:'translateY(-1px)'},secondary:{background:'rgba(255,255,255,.04)',borderColor:'var(--t3)'},ghost:{background:'rgba(255,255,255,.06)'},danger:{filter:'brightness(1.2)'}};
  const isz=size==='sm'?14:16;
  return(
    <button type={type} onClick={!disabled&&!loading?onClick:undefined} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fb)',fontWeight:500,cursor:disabled?'not-allowed':'pointer',
        borderRadius:'var(--rs)',transition:'all var(--fast)',whiteSpace:'nowrap',width:fullWidth?'100%':undefined,
        opacity:disabled?.5:1,...sz[size],...vs[variant],...(h&&!disabled?hv[variant]:{}),...cs}}>
      {loading?<Icon name="loader" size={isz} style={{animation:'spin 1s linear infinite'}}/>:icon?<Icon name={icon} size={isz}/>:null}
      {children&&<span>{children}</span>}
      {iconRight&&<Icon name={iconRight} size={isz}/>}
    </button>
  );
}

// ══════════════════════════════════════════════
// BADGE
// ══════════════════════════════════════════════
const badgeColors={default:['var(--card-h)','var(--t2)'],success:['var(--green-15)','var(--green)'],error:['var(--red-15)','var(--red)'],warning:['var(--yellow-15)','var(--yellow)'],info:['var(--accent-15)','var(--accent-l)'],purple:['rgba(168,85,247,.15)','#A855F7'],orange:['rgba(249,115,22,.15)','#F97316'],cyan:['var(--cyan-15)','var(--cyan)']};
function Badge({children,variant='default',pulse,dot,style:cs}){
  const[bg,fg]=badgeColors[variant]||badgeColors.default;
  return <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:500,background:bg,color:fg,whiteSpace:'nowrap',...cs}}>
    {(pulse||dot)&&<span style={{width:6,height:6,borderRadius:'50%',background:fg,...(pulse?{animation:'pulse 2s infinite'}:{})}}/>}{children}</span>;
}

// ══════════════════════════════════════════════
// CARD
// ══════════════════════════════════════════════
function Card({children,hover,onClick,style:cs,padding='20px',className='',glow}){
  const[h,setH]=useState(false);
  return <div className={className} onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{background:'var(--card)',borderRadius:'var(--rl)',border:'1px solid var(--border)',padding,transition:'all var(--tr)',
      cursor:onClick?'pointer':undefined,...(hover&&h?{borderColor:'var(--t3)',background:'var(--card-h)',transform:'translateY(-2px)'}:{}),
      ...(glow?{boxShadow:'0 0 20px rgba(99,102,241,.2)'}:{}),...cs}}>
    {children}
  </div>;
}

// ══════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════
function Input({icon,label,placeholder,type='text',value,onChange,rightIcon,onRightClick,error,style:cs,disabled}){
  const[focused,setF]=useState(false);
  const[showPw,setSP]=useState(false);
  const isP=type==='password';
  return <div style={{display:'flex',flexDirection:'column',gap:6,...cs}}>
    {label&&<label style={{fontSize:13,fontWeight:500,color:'var(--t2)'}}>{label}</label>}
    <div style={{display:'flex',alignItems:'center',gap:10,background:'var(--input-bg)',border:`1px solid ${error?'var(--red)':focused?'var(--border-f)':'var(--border)'}`,
      borderRadius:'var(--rs)',padding:'10px 14px',transition:'border-color var(--fast)'}}>
      {icon&&<Icon name={icon} size={18} style={{color:'var(--t3)',flexShrink:0}}/>}
      <input type={isP&&showPw?'text':type} placeholder={placeholder} value={value} onChange={e=>onChange?.(e.target.value)} disabled={disabled}
        onFocus={()=>setF(true)} onBlur={()=>setF(false)}
        style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--t1)',fontSize:14,fontFamily:'var(--fb)',width:'100%'}}/>
      {isP&&<Icon name={showPw?'eye-off':'eye'} size={18} style={{color:'var(--t3)',cursor:'pointer'}} onClick={()=>setSP(!showPw)}/>}
      {rightIcon&&<Icon name={rightIcon} size={18} style={{color:'var(--t3)',cursor:'pointer'}} onClick={onRightClick}/>}
    </div>
    {error&&<span style={{fontSize:12,color:'var(--red)'}}>{error}</span>}
  </div>;
}

function Textarea({label,placeholder,value,onChange,rows=3,style:cs}){
  const[focused,setF]=useState(false);
  return <div style={{display:'flex',flexDirection:'column',gap:6,...cs}}>
    {label&&<label style={{fontSize:13,fontWeight:500,color:'var(--t2)'}}>{label}</label>}
    <textarea placeholder={placeholder} value={value} onChange={e=>onChange?.(e.target.value)} rows={rows}
      onFocus={()=>setF(true)} onBlur={()=>setF(false)}
      style={{background:'var(--input-bg)',border:`1px solid ${focused?'var(--border-f)':'var(--border)'}`,borderRadius:'var(--rs)',
        padding:'10px 14px',color:'var(--t1)',fontSize:14,fontFamily:'var(--fb)',resize:'vertical',outline:'none',transition:'border-color var(--fast)'}}/>
  </div>;
}

function Select({label,options,value,onChange,style:cs}){
  return <div style={{display:'flex',flexDirection:'column',gap:6,...cs}}>
    {label&&<label style={{fontSize:13,fontWeight:500,color:'var(--t2)'}}>{label}</label>}
    <select value={value} onChange={e=>onChange?.(e.target.value)}
      style={{background:'var(--input-bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'10px 14px',color:'var(--t1)',fontSize:14,outline:'none',appearance:'none',
        backgroundImage:`url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E")`,
        backgroundRepeat:'no-repeat',backgroundPosition:'right 12px center'}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>;
}

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
function Modal({isOpen,onClose,title,children,width=480}){
  if(!isOpen)return null;
  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={onClose}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(8px)'}}/>
      <div onClick={e=>e.stopPropagation()} style={{position:'relative',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--rl)',
        width:'100%',maxWidth:width,maxHeight:'80vh',overflow:'auto',animation:'scaleIn .2s ease'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>
          <h3 style={{fontSize:16,fontWeight:600}}>{title}</h3>
          <div style={{cursor:'pointer',color:'var(--t3)',padding:4}} onClick={onClose}><Icon name="x" size={18}/></div>
        </div>
        <div style={{padding:20}}>{children}</div>
      </div>
    </div>,
    document.body
  );
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function Tabs({tabs,active,onChange,style:cs}){
  return <div style={{display:'flex',gap:2,borderBottom:'1px solid var(--border)',paddingBottom:0,...cs}}>
    {tabs.map(t=>{
      const isA=active===t.key;
      return <button key={t.key} onClick={()=>onChange(t.key)}
        style={{display:'flex',alignItems:'center',gap:6,padding:'10px 16px',fontSize:13,fontWeight:isA?600:400,
          color:isA?'var(--accent-l)':'var(--t3)',background:'none',border:'none',borderBottom:isA?'2px solid var(--accent)':'2px solid transparent',
          cursor:'pointer',transition:'all var(--fast)',marginBottom:-1,whiteSpace:'nowrap'}}>
        {t.icon&&<Icon name={t.icon} size={15}/>}{t.label}
      </button>;
    })}
  </div>;
}

// ══════════════════════════════════════════════
// PROGRESS BAR
// ══════════════════════════════════════════════
function ProgressBar({value=0,color='var(--accent)',height=6,style:cs,showLabel}){
  return <div style={{display:'flex',alignItems:'center',gap:10,...cs}}>
    <div style={{flex:1,height,background:'var(--border)',borderRadius:height,overflow:'hidden'}}>
      <div style={{width:`${Math.min(100,value)}%`,height:'100%',background:color,borderRadius:height,transition:'width .6s ease'}}/>
    </div>
    {showLabel&&<span style={{fontSize:12,color:'var(--t2)',whiteSpace:'nowrap'}}>{Math.round(value)}%</span>}
  </div>;
}

// ══════════════════════════════════════════════
// STEPPER
// ══════════════════════════════════════════════
function Stepper({steps,style:cs}){
  return <div style={{display:'flex',alignItems:'center',gap:0,...cs}}>
    {steps.map((s,i)=>{
      const done=s.completed;const act=s.active;
      return <Fragment key={i}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:600,
            background:done?'var(--accent)':act?'var(--accent-15)':'var(--border)',color:done?'#fff':act?'var(--accent-l)':'var(--t3)',
            border:act?'2px solid var(--accent)':'2px solid transparent',transition:'all var(--tr)'}}>
            {done?<Icon name="check" size={14}/>:i+1}
          </div>

      </Fragment>;

  </div>;
}

// ══════════════════════════════════════════════
// FILE UPLOAD
// ══════════════════════════════════════════════
function FileUpload({accept,label,description,icon='upload',onFile,fileName,onRemove,style:cs}){
  const[drag,setD]=useState(false);
  const ref=useRef();
  return <div style={{...cs}}>
    {!fileName?
      <div onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setD(true)}} onDragLeave={()=>setD(false)} onDrop={e=>{e.preventDefault();setD(false);onFile?.(e.dataTransfer.files[0]?.name)}}
        style={{border:`2px dashed ${drag?'var(--accent)':'var(--border)'}`,borderRadius:'var(--rl)',padding:'32px 24px',textAlign:'center',cursor:'pointer',
          background:drag?'var(--accent-10)':'transparent',transition:'all var(--tr)'}}>

        <div style={{fontSize:14,fontWeight:500,color:'var(--t2)',marginBottom:4}}>{label||'Перетащите файл сюда'}</div>
        <div style={{fontSize:12,color:'var(--t3)'}}>{description||accept}</div>
        <Button variant="secondary" size="sm" style={{marginTop:12}}>Выбрать файл</Button>
        <input ref={ref} type="file" accept={accept} style={{display:'none'}} onChange={e=>onFile?.(e.target.files[0]?.name)}/>
      </div>
    :
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--rm)'}}>
        <Icon name="file-text" size={18} style={{color:'var(--green)'}}/>

    }
  </div>;
}

// ══════════════════════════════════════════════
// SCORE SLIDER
// ══════════════════════════════════════════════
function ScoreSlider({value=5,onChange,min=0,max=10,label,style:cs}){
  const pct=((value-min)/(max-min))*100;
  return <div style={{...cs}}>
    {label&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:13,fontWeight:500,color:'var(--t2)'}}>{label}</span><span style={{fontSize:14,fontWeight:600,color:'var(--accent-l)'}}>{value}</span></div>}
    <div style={{position:'relative',height:6,background:'var(--border)',borderRadius:3}}>
      <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${pct}%`,background:'var(--accent)',borderRadius:3,transition:'width .15s ease'}}/>
    </div>
    <input type="range" min={min} max={max} step={1} value={value} onChange={e=>onChange?.(+e.target.value)}
      style={{width:'100%',marginTop:-8,opacity:0,height:22,cursor:'pointer',position:'relative',zIndex:1}}/>
    <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}><span style={{fontSize:11,color:'var(--t4)'}}>{min}</span><span style={{fontSize:11,color:'var(--t4)'}}>{max}</span></div>
  </div>;
}

// ══════════════════════════════════════════════
// EMPTY STATE
// ══════════════════════════════════════════════
function EmptyState({icon='inbox',title,description,action,onAction,style:cs}){
  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'48px 24px',textAlign:'center',...cs}}>
    <div style={{width:56,height:56,borderRadius:'50%',background:'var(--accent-10)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
      <Icon name={icon} size={24} style={{color:'var(--accent-l)'}}/>
    </div>
    <h3 style={{fontSize:16,fontWeight:600,marginBottom:6}}>{title}</h3>
    {description&&<p style={{fontSize:13,color:'var(--t3)',maxWidth:320,marginBottom:action?16:0}}>{description}</p>}
    {action&&<Button variant="secondary" size="sm" onClick={onAction}>{action}</Button>}
  </div>;
}

// ══════════════════════════════════════════════
// TOAST SYSTEM
// ══════════════════════════════════════════════
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const[toasts,setT]=useState([]);
  const add=useCallback((msg,type='info')=>{const id=Date.now();setT(p=>[...p,{id,msg,type}]);setTimeout(()=>setT(p=>p.filter(t=>t.id!==id)),3000)},[]);
  const toast=useCallback({success:m=>add(m,'success'),error:m=>add(m,'error'),info:m=>add(m,'info'),warning:m=>add(m,'warning')},[add]);
  return <ToastCtx.Provider value={toast}>{children}
    <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
      {toasts.map(t=>{
        const c={success:'var(--green)',error:'var(--red)',warning:'var(--yellow)',info:'var(--accent)'}[t.type];
        return <div key={t.id} style={{background:'var(--card)',border:'1px solid var(--border)',borderLeft:`3px solid ${c}`,borderRadius:'var(--rm)',padding:'12px 16px',
          fontSize:13,color:'var(--t1)',minWidth:240,animation:'slideR .25s ease',boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>{t.msg}</div>;
      })}
    </div>
  </ToastCtx.Provider>;
}
function useToast(){return useContext(ToastCtx)}

// ══════════════════════════════════════════════
// STAT CARD
// ══════════════════════════════════════════════
function StatCard({value,label,icon,color='var(--accent)',style:cs}){
  return <Card style={{padding:'16px 20px',...cs}}>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
      <div>
        <div style={{fontSize:28,fontWeight:700,fontFamily:'var(--fh)',color}}>{value}</div>
        <div style={{fontSize:13,color:'var(--t3)',marginTop:2}}>{label}</div>
      </div>
      {icon&&<div style={{width:40,height:40,borderRadius:'var(--rm)',background:`color-mix(in srgb,${color} 15%,transparent)`,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Icon name={icon} size={20} style={{color}}/>
      </div>}
    </div>
  </Card>;
}

// Export all
Object.assign(window,{Icon,Button,Badge,Card,Input,Textarea,Select,Modal,Tabs,ProgressBar,Stepper,FileUpload,ScoreSlider,EmptyState,ToastProvider,useToast,ToastCtx,StatCard});

          <div style={{ marginTop: 20 }}>
            <label style={{ fontSize: 13, fontWeight: 500, color: 'var(--t2)', display: 'block', marginBottom: 10 }}>Выберите роль</label>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
              {roles.map(r => {

                return (
                  <div key={r.key} onClick={() => setRole(r.key)}

                      background: sel ? 'var(--accent-15)' : 'var(--bg)', border: sel ? '1px solid var(--accent)' : '1px solid var(--border)',
                      boxShadow: sel ? '0 0 16px rgba(99,102,241,.2)' : 'none' }}>
                    <div style={{ width: 36, height: 36, borderRadius: '50%', margin: '0 auto 8px', display: 'flex', alignItems: 'center', justifyContent: 'center',

                      <Icon name={r.icon} size={18} />

                    <div style={{ fontSize: 13, fontWeight: sel ? 600 : 400, color: sel ? 'var(--accent-l)' : 'var(--t2)', marginBottom: 2 }}>{r.label}</div>

          <Button type="submit" fullWidth loading={loading} style={{ marginTop: 24, padding: '12px 24px', fontSize: 15 }}>

          <p style={{ textAlign: 'center', marginTop: 16, fontSize: 13, color: 'var(--t3)' }}>

            <span onClick={onSwitch} style={{ color: 'var(--accent-l)', cursor: 'pointer', fontWeight: 500 }}>Войти</span>
          </p>
        </form>
      </div>
    </div>
  );
}

// SUBMISSION PAGE — KEY SCREEN
// ══════════════════════════════════════════════
function SubmissionPage() {
  const [submitted, setSubmitted] = useState(false);
  const [repoUrl, setRepoUrl] = useState('https://github.com/supercoders/hackscore');
  const [repoType, setRepoType] = useState('url');
  const [docFile, setDocFile] = useState('documentation.pdf');
  const [presFile, setPresFile] = useState(null);
  const [videoType, setVideoType] = useState('file');
  const [videoFile, setVideoFile] = useState(null);
  const [activeReport, setReport] = useState(null);

  const steps = [
    { label: 'Репозиторий', completed: !!repoUrl, active: !repoUrl },
    { label: 'Документация', completed: !!docFile, active: !!repoUrl && !docFile },
    { label: 'Презентация', completed: !!presFile, active: !!docFile && !presFile },
    { label: 'Скринкаст', completed: !!videoFile, active: !!presFile && !videoFile },
    { label: 'Готово', completed: submitted, active: false },
  ];

  const checks = [
    { type: 'code', icon: 'file-code', label: 'Код', status: 'completed', score: 7.5 },
    { type: 'doc', icon: 'file-text', label: 'Документация', status: 'completed', score: 8.5 },
    { type: 'pres', icon: 'presentation', label: 'Презентация', status: 'running', score: null },
    { type: 'video', icon: 'film', label: 'Скринкаст', status: 'failed', score: null, error: 'Формат не поддерживается' },
  ];

  const checkColors = { completed: 'var(--green)', running: 'var(--yellow)', failed: 'var(--red)', pending: 'var(--t3)' };
  const checkLabels = { completed: 'Готово', running: 'Проверка...', failed: 'Ошибка', pending: 'Ожидание' };

  const codeReport = {
    structure: [
      { name: 'README.md', found: true }, { name: 'requirements.txt', found: true },
      { name: 'Dockerfile', found: true }, { name: 'LICENSE', found: false }, { name: '.gitignore', found: true },
    ],
    metrics: { loc: '4,230', complexity: '3.2', maintainability: '78/100' },
    lint: { errors: 3, warnings: 12, rating: '8.7/10' },
    secrets: [{ file: 'config.py', type: 'Потенциальный секрет' }],
  };

  return (
    <div>
      <PageHeader title="Загрузка решения">
        <Badge variant={submitted ? 'success' : 'warning'}>{submitted ? 'Отправлено' : 'Черновик'}</Badge>
      </PageHeader>

      <Card style={{ marginBottom: 24, padding: '20px 28px', overflow: 'auto' }}>
        <Stepper steps={steps} />
      </Card>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* Repository */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="file-code" size={20} style={{ color: 'var(--accent-l)' }} />
              <h3 style={{ fontSize: 15, fontWeight: 600 }}>Репозиторий кода</h3>
            </div>
            {repoUrl && <Badge variant="success"><Icon name="check" size={12} /> Готово</Badge>}
          </div>
          <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
            {['url', 'archive'].map(t => (
              <label key={t} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: repoType === t ? 'var(--t1)' : 'var(--t3)', cursor: 'pointer' }}>
                <div style={{ width: 16, height: 16, borderRadius: '50%', border: `2px solid ${repoType === t ? 'var(--accent)' : 'var(--border)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {repoType === t && <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)' }} />}
                </div>
                {t === 'url' ? 'URL репозитория' : 'Архив'}
              </label>
            ))}
          </div>
          {repoType === 'url' ? <Input icon="git-branch" placeholder="https://github.com/team/project" value={repoUrl} onChange={setRepoUrl} /> : <FileUpload accept=".zip,.tar.gz" label="Перетащите архив сюда" description="ZIP или TAR.GZ · до 50 МБ" />}
          <Button variant="secondary" size="sm" icon="save" style={{ marginTop: 12 }}>Сохранить</Button>
        </Card>

        {/* Documentation */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="file-text" size={20} style={{ color: 'var(--accent-l)' }} />
              <h3 style={{ fontSize: 15, fontWeight: 600 }}>Документация</h3>
            </div>
            {docFile ? <Badge variant="success"><Icon name="check" size={12} /> Готово</Badge> : <Badge variant="default">—</Badge>}
          </div>
          <FileUpload accept=".pdf,.docx,.md" label="Перетащите файл сюда" description="PDF, DOCX или Markdown · до 20 МБ" icon="file-text" fileName={docFile} onFile={setDocFile} onRemove={() => setDocFile(null)} />
        </Card>

        {/* Presentation */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="presentation" size={20} style={{ color: 'var(--accent-l)' }} />
              <h3 style={{ fontSize: 15, fontWeight: 600 }}>Презентация</h3>
            </div>
            {presFile ? <Badge variant="success"><Icon name="check" size={12} /> Готово</Badge> : <Badge variant="default">—</Badge>}
          </div>
          <FileUpload accept=".pptx,.pdf" label="Перетащите презентацию сюда" description="PPTX или PDF · до 20 МБ" icon="presentation" fileName={presFile} onFile={setPresFile} onRemove={() => setPresFile(null)} />
        </Card>

        {/* Screencast */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="film" size={20} style={{ color: 'var(--accent-l)' }} />
              <h3 style={{ fontSize: 15, fontWeight: 600 }}>Скринкаст</h3>
            </div>
            {videoFile ? <Badge variant="success"><Icon name="check" size={12} /> Готово</Badge> : <Badge variant="default">—</Badge>}
          </div>
          <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
            {['file', 'url'].map(t => (
              <label key={t} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: videoType === t ? 'var(--t1)' : 'var(--t3)', cursor: 'pointer' }}>
                <div style={{ width: 16, height: 16, borderRadius: '50%', border: `2px solid ${videoType === t ? 'var(--accent)' : 'var(--border)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {videoType === t && <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)' }} />}
                </div>
                {t === 'file' ? 'Загрузить файл' : 'Ссылка на видео'}
              </label>
            ))}
          </div>
          {videoType === 'file' ? <FileUpload accept=".mp4,.webm,.mov" label="Перетащите видео сюда" description="MP4, WebM или MOV · до 100 МБ" icon="film" fileName={videoFile} onFile={setVideoFile} onRemove={() => setVideoFile(null)} /> : <Input icon="play" placeholder="https://youtube.com/watch?v=..." />}
        </Card>
      </div>

      {/* Submit button */}
      {!submitted && <Button fullWidth icon="rocket" onClick={() => setSubmitted(true)} style={{ marginTop: 24, padding: '14px 24px', fontSize: 16 }}>
        Отправить на проверку
      </Button>}
      {!submitted && <p style={{ textAlign: 'center', fontSize: 12, color: 'var(--t3)', marginTop: 8 }}>После отправки начнётся автоматическая проверка всех артефактов</p>}

      {/* Results after submit */}
      {submitted && (
        <div style={{ marginTop: 32, animation: 'fadeUp .4s ease' }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="bar-chart" size={20} style={{ color: 'var(--accent-l)' }} /> Результаты автоматических проверок
          </h2>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            {checks.map(c => (
              <Card key={c.type} hover onClick={() => c.status === 'completed' && setReport(activeReport === c.type ? null : c.type)} style={{ cursor: c.status === 'completed' ? 'pointer' : 'default' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                  <Icon name={c.icon} size={20} style={{ color: checkColors[c.status] }} />
                  <span style={{ fontSize: 14, fontWeight: 600 }}>{c.label}</span>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    {c.status === 'running' && <Icon name="loader" size={14} style={{ color: 'var(--yellow)', animation: 'spin 1s linear infinite' }} />}
                    {c.status === 'completed' && <Icon name="check" size={14} style={{ color: 'var(--green)' }} />}
                    {c.status === 'failed' && <Icon name="alert-circle" size={14} style={{ color: 'var(--red)' }} />}
                    <span style={{ fontSize: 13, color: checkColors[c.status] }}>{c.error || checkLabels[c.status]}</span>
                  </div>
                  {c.score != null && <span style={{ fontSize: 18, fontWeight: 700, color: 'var(--t1)', fontFamily: 'var(--fh)' }}>{c.score}<span style={{ fontSize: 13, color: 'var(--t3)', fontWeight: 400 }}> / 10</span></span>}
                </div>
                {c.status === 'completed' && <div style={{ fontSize: 12, color: 'var(--accent-l)', marginTop: 8, display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span>{activeReport === c.type ? 'Скрыть отчёт' : 'Подробный отчёт'}</span>
                  <Icon name={activeReport === c.type ? 'chevron-down' : 'chevron-right'} size={12} />
                </div>}

                {/* Expanded report */}
                {activeReport === c.type && c.type === 'code' && (
                  <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--border)', animation: 'fadeIn .2s ease' }}>
                    <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Структура репозитория</div>
                    {codeReport.structure.map((s, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: s.found ? 'var(--green)' : 'var(--red)', padding: '3px 0' }}>

  </script>

  <script type="text/babel">
const { useState, useEffect } = React;

    const DEMO_USERS = {
      'team1@hackscore.ru':   { name: 'Иван Петров', email: 'team1@hackscore.ru', role: 'participant' },
      'jury1@hackscore.ru':   { name: 'Анна Кузнецова', email: 'jury1@hackscore.ru', role: 'jury' },
      'admin@hackscore.ru':   { name: 'Сергей Волков', email: 'admin@hackscore.ru', role: 'organizer' },
    };

    const DEFAULT_PAGES = { participant: 'hackathons', jury: 'reviews', organizer: 'hackathon-manage' };

    function App() {
      const [authView, setAuthView] = useState('login'); // 'login' | 'register'
      const [user, setUser] = useState(null);
      const [role, setRole] = useState('participant');
      const [page, setPage] = useState('hackathons');
      const toast = useToast();

      // Restore session
      useEffect(() => {
        const saved = localStorage.getItem('hs_user');
        if (saved) {
          try {
            const d = JSON.parse(saved);
            setUser(d.user);
            setRole(d.role);
            setPage(d.page || DEFAULT_PAGES[d.role]);
          } catch(e) {}
        }
      }, []);

      // Persist session
      useEffect(() => {
        if (user) localStorage.setItem('hs_user', JSON.stringify({ user, role, page }));
      }, [user, role, page]);

      const handleLogin = ({ email }) => {
        const u = DEMO_USERS[email] || { name: email.split('@')[0], email, role: 'participant' };
        setUser(u);
        setRole(u.role);
        setPage(DEFAULT_PAGES[u.role]);
        toast?.success?.('Добро пожаловать, ' + u.name + '!');
      };

      const handleRegister = ({ name, email, role: r }) => {
        const u = { name: name || 'Пользователь', email, role: r || 'participant' };
        setUser(u);
        setRole(u.role);
        setPage(DEFAULT_PAGES[u.role]);
        toast?.success?.('Аккаунт создан!');
      };

      const handleLogout = () => {
        setUser(null);
        setAuthView('login');
        localStorage.removeItem('hs_user');
      };

      const handleRoleSwitch = (r) => {
        setRole(r);
        setPage(DEFAULT_PAGES[r]);
      };

      const navigate = (p) => setPage(p);

      // ── Auth screens ──
      if (!user) {
        if (authView === 'register') return <RegisterPage onRegister={handleRegister} onSwitch={() => setAuthView('login')} />;
        return <LoginPage onLogin={handleLogin} onSwitch={() => setAuthView('register')} />;
      }

      // ── Page router ──
      const renderPage = () => {
        switch (page) {
          // Participant
          case 'hackathons':    return <HackathonListPage onNavigate={navigate} />;
          case 'team':          return <TeamPage />;
          case 'submission':    return <SubmissionPage />;
          case 'results':       return <ResultsPage />;
          case 'algo':          return <AlgoTasksPage onNavigate={navigate} />;
          case 'algo-results':  return <AlgoTasksPage onNavigate={navigate} />;
          case 'algo-detail':   return <AlgoTaskDetailPage onBack={navigate} />;
          // Jury
          case 'reviews':       return <ReviewListPage onNavigate={navigate} />;
          case 'review-detail': return <ReviewDetailPage onBack={navigate} />;
          case 'my-scores':     return <ReviewListPage onNavigate={navigate} />;
          // Organizer
          case 'hackathon-manage': return <HackathonManagePage />;
          case 'criteria':         return <CriteriaPage />;
          case 'teams-overview':   return <TeamsOverviewPage />;
          case 'algo-manage':      return <AlgoManagePage />;
          case 'algo-results-org': return <AlgoManagePage />;
          case 'export':           return <LeaderboardPage />;
          // Shared
          case 'leaderboard':      return <LeaderboardPage />;
          default:                 return <EmptyState icon="search" title="Страница не найдена" description="Выберите пункт в боковом меню" />;
        }
      };

      return (
        <AppLayout role={role} activePage={page} onNavigate={navigate} user={user} onRoleSwitch={handleRoleSwitch} onLogout={handleLogout}>
          {renderPage()}
        </AppLayout>
      );
    }

    function Root() {
      return (
        <ToastProvider>
          <App />
        </ToastProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
