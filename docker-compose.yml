services:
  postgres:
    image: postgres:16
    container_name: hackscore-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hackscore}
      POSTGRES_USER: ${POSTGRES_USER:-hackscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackscore}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackscore} -d ${POSTGRES_DB:-hackscore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hackscore-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hackscore-backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://hackscore:hackscore@postgres:5432/hackscore}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      HACKSCORE_AUTO_SEED: ${HACKSCORE_AUTO_SEED:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
    container_name: hackscore-celery-worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://hackscore:hackscore@postgres:5432/hackscore}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      HACKSCORE_RUN_MIGRATIONS: "false"
      HACKSCORE_AUTO_SEED: "false"
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hackscore-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
